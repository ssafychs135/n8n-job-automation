# A1 배포 전용 override. A1의 프로젝트 루트에 이 파일을 두면 compose가 자동 병합한다.
# ⚠️ 맥(로컬)에는 두지 말 것 — 맥은 실제 LM Studio가 host:1234라 프록시가 불필요/충돌.
services:
  n8n:
    # A1에선 host.docker.internal 을 '호스트'가 아니라 프록시 '컨테이너'로 향하게 한다.
    # (컨테이너→호스트 발행포트는 OCI 기본 iptables INPUT REJECT에 막히므로 컨테이너끼리 직접 연결)
    # base compose의 extra_hosts(host-gateway)를 지워야 docker DNS가 아래 별칭을 해석한다.
    extra_hosts: !reset null
    # UI는 SSH 포트포워드로만 접근(공개 노출 없음). 127.0.0.1 전용 바인딩.
    ports: !override
      - "127.0.0.1:5678:5678"
    volumes:
      - ./workflows:/workflows:ro   # CD의 import:workflow 소스(GitOps)
    # DB 이전(2026-07-21): 워크플로우 Postgres 자격증명 host=postgres 가 career-agent 소유
    # Postgres(jobs_shared 별칭 postgres)로 해석되도록 재연결. 구 로컬 postgres 의존 제거.
    depends_on: !reset null
    networks:
      default: {}
      jobs_shared: {}               # career-agent 소유 Postgres(별칭 postgres)에 도달

  postgres:
    # 외부/공개 노출 불필요 — 로컬 전용 바인딩(컨테이너끼리는 compose 네트워크로 통신).
    ports: !override
      - "127.0.0.1:5432:5432"
    # DB 이전 완료 → 구 로컬 DB는 legacy 프로파일로 게이트(up -d 기본 미기동, 가역 은퇴).
    # 데이터·볼륨(./data/postgres)은 롤백 위해 보존. 되살리려면 --profile legacy.
    profiles: ["legacy"]

  # 맥 LM Studio 자리를 대신하는 인증주입 리버스프록시.
  # 같은 default 네트워크에서 host.docker.internal 별칭으로 노출 → n8n이 :1234로 직접 접속.
  # 외부 노출은 OCI 보안목록(인바운드 22만 허용) + 127.0.0.1 바인딩이 차단.
  llm-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:1234:1234"   # 호스트 디버깅용(로컬 전용). 컨테이너 경로는 네트워크 별칭 사용.
    environment:
      - CF_ID=${CF_ACCESS_CLIENT_ID}
      - CF_SECRET=${CF_ACCESS_CLIENT_SECRET}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      default:
        aliases:
          - host.docker.internal

# career-agent가 소유한 공유 Postgres 네트워크(외부 생성됨: docker network create jobs_shared).
networks:
  jobs_shared:
    external: true
