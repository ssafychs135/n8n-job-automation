# n8n 채용 공고 수집·요약 워크플로우용 로컬 셀프호스팅 구성
# 실행: docker compose up -d  (같은 폴더의 .env 값을 자동으로 읽어들임)

services:
  n8n:
    # n8n 공식 이미지. arm64/amd64 멀티아치라 Apple Silicon(M5)에서도 그대로 동작.
    # 재현성을 위해 버전 태그를 고정(pin)함. 업그레이드는 이 숫자만 올리면 됨.
    image: docker.n8n.io/n8nio/n8n:1.104.0

    # 컨테이너가 죽거나 맥을 재부팅해도 자동 재기동. (수동으로 stop 한 경우엔 안 켜짐)
    restart: unless-stopped

    ports:
      # 호스트 5678 → 컨테이너 5678. 브라우저에서 http://localhost:5678 로 접속.
      - "5678:5678"

    extra_hosts:
      # 컨테이너 안에서 host.docker.internal 이름으로 "맥 호스트"를 가리키게 함.
      # 호스트에서 도는 LM Studio(OpenAI 호환 서버, :1234)에 접속하기 위해 필요.
      # Linux 등 일부 플랫폼은 기본 제공이 안 되므로 host-gateway 로 명시해 이식성 확보.
      - "host.docker.internal:host-gateway"

    environment:
      # 스케줄(cron) 트리거가 한국 시간 기준으로 돌도록 타임존 지정.
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - TZ=${TZ}
      # n8n이 스스로를 어떤 호스트/포트로 인식할지. (웹훅 URL 생성 등에 사용)
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=${N8N_PORT}
      # HTTPS 없이 http://localhost 로 로그인 가능하게 함(로컬 개발용).
      # 운영에 배포할 땐 반드시 HTTPS + true 로 되돌릴 것.
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE}
      # 코드/AI 노드 실행을 별도 러너 프로세스로 분리(최신 n8n 권장 설정).
      - N8N_RUNNERS_ENABLED=true

    volumes:
      # n8n 상태 영속화: SQLite DB, 자격증명(credentials), 워크플로우가 여기에 저장됨.
      # 이 폴더만 있으면 컨테이너를 지워도 데이터가 남음.
      - ./data/n8n:/home/node/.n8n
      # 워크플로우가 만든 Markdown 결과물을 호스트에서 바로 열어볼 수 있게 매핑.
      - ./data/output:/data/output
    # n8n이 뜨기 전에 DB가 준비되도록 (연결 자체는 워크플로우 실행 시점에 함).
    depends_on:
      - postgres

  # 수집 공고 저장·중복관리·통계용 PostgreSQL.
  # n8n은 같은 Docker 네트워크에서 host "postgres", port 5432 로 접속한다.
  postgres:
    # pgvector 확장 포함 이미지(의미검색용). PG16이라 기존 data/postgres 그대로 호환.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # 자연어검색용 읽기전용 롤 비밀번호(roles.sh가 이 값으로 롤 생성). 하드코딩 금지.
      - JOBS_RO_PASSWORD=${JOBS_RO_PASSWORD}
      # 컨테이너/로그 시간을 KST로 (timestamp 표시 일관성). DB 세션 타임존은
      # init 후 'ALTER DATABASE ... SET timezone' 로도 고정됨(재시작에도 유지).
      - TZ=Asia/Seoul
      - PGTZ=Asia/Seoul
    volumes:
      # DB 데이터 영속화: 이 폴더만 있으면 컨테이너를 지워도 데이터가 남음.
      - ./data/postgres:/var/lib/postgresql/data
      # 최초 기동 시 초기화 (init.sql=스키마 → roles.sh=읽기전용롤, 알파벳순 실행).
      - ./db:/docker-entrypoint-initdb.d:ro
    ports:
      # (선택) 호스트에서 psql·DBeaver 등으로 직접 통계 쿼리하려면 사용. 불필요하면 삭제 가능.
      - "5432:5432"

# 참고: Ollama 같은 별도 LLM 서비스를 두지 않는다.
# LLM(Gemma 4 E4B, MLX)은 Metal 직접 접근이 필요해 Docker 안에서 못 돌기 때문에
# 맥 "호스트"에서 LM Studio로 실행하고, n8n은 host.docker.internal:1234 로 접속한다.
